server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: vector-monitoring-platform
  
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/vector_monitoring?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # Redis配置
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

# MyBatis Plus配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:/mapper/**/*.xml

# JWT配置
jwt:
  secret: your-secret-key-here-change-in-production
  expiration: 86400000  # 24小时

# Kimi API配置
kimi:
  api:
    key:  # 从 https://platform.moonshot.cn 获取API Key
    url: https://api.moonshot.cn/v1/chat/completions
    model: moonshot-v1-8k-vision-preview

# 文件上传配置
upload:
  path: /data/uploads/
  max-size: 10485760  # 10MB

# 日志配置
logging:
  level:
    com.cdc.vector: DEBUG
    org.springframework.security: DEBUG