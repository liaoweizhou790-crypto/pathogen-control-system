version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: vector-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: vector_monitoring
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: vector-redis
    ports:
      - "6379:6379"

  backend:
    image: maven:3.9-eclipse-temurin-17
    container_name: vector-backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - maven_cache:/root/.m2
    ports:
      - "8080:8080"
    command: mvn spring-boot:run
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/vector_monitoring
      - SPRING_REDIS_HOST=redis
    depends_on:
      - mysql
      - redis

  frontend:
    image: node:20-alpine
    container_name: vector-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3003:3003"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  mysql_data:
  maven_cache: