<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="病原微生物防控">
    <meta name="description" content="柳州市疾病预防控制中心病原微生物防控系统">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <link rel="stylesheet" href="css/style.css">
    <!-- PDF.js for PDF text extraction -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <title>柳州市疾病预防控制中心病原微生物防控系统（v1.5.2）</title>
</head>
<body>
    <div class="container">
        <h1>🧬 柳州市疾病预防控制中心病原微生物防控系统（v1.5.2）</h1>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab(0)">🧪 配比计算</button>
            <button class="tab" onclick="showTab(1)">📋 推荐浓度</button>
            <button class="tab" onclick="showTab(2)">🦠 传染病方案</button>
            <button class="tab" onclick="showTab(3)">📁 技术文件</button>
            <button class="tab" onclick="showTab(4)">📝 配比记录</button>
            <button class="tab" onclick="showTab(5)">⭐ 常用方案</button>
        </div>
        
        <div class="content">
            <!-- 配比计算 -->
            <div class="tab-content active" id="tab-0">
                <div class="form-row">
                    <div class="form-group">
                        <label>计算模式</label>
                        <select id="calcMode" onchange="toggleCalcMode()">
                            <option value="dilution">计算稀释倍数</option>
                            <option value="volume">计算配制量</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>消毒剂类别</label>
                        <select id="category" onchange="updateDisinfectants()">
                            <option value="">请选择类别</option>
                            <option value="含氯消毒剂">含氯消毒剂</option>
                            <option value="醇类">醇类</option>
                            <option value="氧化物类">氧化物类</option>
                            <option value="过氧化物类">过氧化物类</option>
                            <option value="季铵盐类">季铵盐类</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>选择消毒剂</label>
                        <select id="disinfectant" onchange="updateConcentration()">
                            <option value="">请先选择类别</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>原液浓度</label>
                        <input type="number" id="sourceConc" step="0.1" value="5.0">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label id="targetLabel">目标浓度</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="number" id="targetConc" step="1" value="500" style="flex: 2;">
                            <select id="targetUnit" style="flex: 1;" onchange="updatePlaceholder()">
                                <option value="mg/L">mg/L</option>
                                <option value="%">%</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" id="volumeGroup" style="display: none;">
                        <label>稀释倍数</label>
                        <input type="number" id="dilutionRatio" step="1" value="100">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label id="volumeLabel">配制容量</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="number" id="volume" step="0.1" value="10" style="flex: 2;">
                            <select id="volumeUnit" style="flex: 1;">
                                <option value="L">升(L)</option>
                                <option value="mL">毫升(mL)</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <button class="btn btn-primary" onclick="calculate()">🔍 计算</button>
                <button class="btn btn-secondary" onclick="saveToFavorites()">⭐ 保存为常用方案</button>
                
                <div id="result" class="result" style="display: none;"></div>
            </div>
            
            <!-- 推荐浓度 -->
            <div class="tab-content" id="tab-1">
                <div class="form-group">
                    <label>选择消毒对象</label>
                    <select id="targetObject" onchange="showRecommendation()">
                        <option value="">请选择消毒对象</option>
                        <option value="环境表面消毒">环境表面消毒</option>
                        <option value="餐饮具消毒">餐饮具消毒</option>
                        <option value="果蔬消毒">果蔬消毒</option>
                        <option value="织物消毒">织物消毒</option>
                        <option value="手消毒">手消毒</option>
                        <option value="皮肤消毒">皮肤消毒</option>
                        <option value="医疗器械消毒">医疗器械消毒</option>
                        <option value="空气消毒">空气消毒</option>
                        <option value="疫源地消毒">疫源地消毒</option>
                        <option value="饮用水消毒">饮用水消毒</option>
                        <option value="污水消毒">污水消毒</option>
                        <option value="冷链消毒">冷链消毒</option>
                    </select>
                </div>
                <div id="recommendationResult"></div>
            </div>
            
            <!-- 传染病方案 -->
            <div class="tab-content" id="tab-2">
                <div class="form-group">
                    <label>选择传染病类别</label>
                    <select id="diseaseClass" onchange="updateDiseaseOptions()">
                        <option value="">请选择类别</option>
                        <option value="甲类">甲类传染病</option>
                        <option value="乙类">乙类传染病</option>
                        <option value="丙类">丙类传染病</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>选择具体病种</label>
                    <select id="diseaseName" onchange="showDiseasePlan()">
                        <option value="">请先选择类别</option>
                    </select>
                </div>
                
                <div id="diseasePlan" style="display: none;">
                    <div id="planContent"></div>
                    <div class="mt-20">
                        <button class="btn btn-primary" onclick="applyDiseasePlan()">✅ 应用此方案</button>
                        <button class="btn btn-secondary" onclick="exportDiseasePlan()">📥 导出方案</button>
                    </div>
                </div>
                
                <div class="info-box" style="margin-top: 20px;">
                    <p><strong>📋 说明：</strong>本系统提供的方案属于通用标准，具体消毒方案以国家相关部门提供的专病防控方案为准。</p>
                </div>
            </div>
            
            <!-- 技术文件 -->
            <div class="tab-content" id="tab-3">
                <div class="file-upload">
                    <input type="file" id="fileInput" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt">
                    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">📎 选择文件</button>
                    <span style="margin-left: 10px; color: #666;">支持PDF、Word、Excel、PPT、TXT</span>
                </div>
                <div id="fileList"></div>
            </div>
            
            <!-- 配比记录 -->
            <div class="tab-content" id="tab-4">
                <div class="action-bar">
                    <button class="btn btn-secondary" onclick="exportRecords()">📊 导出CSV</button>
                    <button class="btn btn-danger" onclick="clearRecords()">🗑️ 清空记录</button>
                </div>
                <div id="recordsList"></div>
            </div>
            
            <!-- 常用方案 -->
            <div class="tab-content" id="tab-5">
                <div id="favoritesList"></div>
            </div>
        </div>
        
        <div class="footer">
            <p>系统版本：V1.5.2</p>
            <p>柳州市疾病预防控制中心 消毒与病媒生物防制所</p>
            <p>📞 联系电话：0772-2825936</p>
        </div>
    </div>
    
    <!-- 数据文件 -->
    <script src="js/data/disinfectants.js"></script>
    <script src="js/data/diseases.js"></script>
    <script src="js/data/recommendations.js"></script>
    
    <!-- 功能模块 -->
    <script src="js/modules/calculator.js"></script>
    <script src="js/modules/disease-plan.js"></script>
    
    <!-- 主程序 -->
    <script src="js/app.js"></script>
</body>
</html>
